<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Dịch Vụ Công - Định Danh Điện Tử VNeID</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Emblem_of_Vietnam.svg/1024px-Emblem_of_Vietnam.svg.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gov-red: #da251d; --gov-gold: #ffde00; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .gov-header {
            background: linear-gradient(90deg, #da251d 0%, #a51c16 100%);
            color: white; padding: 20px 0; border-bottom: 5px solid var(--gov-gold);
        }
        .card-login { border-top: 6px solid var(--gov-red); border-radius: 10px; }
        .btn-gov { background-color: var(--gov-red); color: white; border: none; font-weight: bold; }
        .btn-gov:hover { background-color: #b71c1c; color: white; }
        .result-box { display: none; }
    </style>
</head>
<body>

    <div class="gov-header text-center shadow">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Emblem_of_Vietnam.svg/1024px-Emblem_of_Vietnam.svg.png" width="70" alt="Quốc Huy">
        <h3 class="mt-3 text-uppercase fw-bold">Hệ thống Định danh và Xác thực điện tử</h3>
        <p class="mb-0">CƠ SỞ DỮ LIỆU QUỐC GIA VỀ DÂN CƯ</p>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div id="loginSection" class="col-md-5">
                <div class="card card-login shadow">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4" style="color: var(--gov-red);">ĐĂNG NHẬP</h4>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Số định danh cá nhân (CCCD)</label>
                            <input type="text" id="userCCCD" class="form-control" placeholder="Nhập 12 số CCCD">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" id="userPass" class="form-control" placeholder="Nhập mật khẩu">
                        </div>
                        <button class="btn btn-gov w-100 py-2" onclick="handleLogin()">ĐĂNG NHẬP</button>
                        <div id="loginError" class="text-danger mt-3 text-center" style="display:none;">Sai CCCD hoặc mật khẩu!</div>
                    </div>
                </div>
            </div>

            <div id="infoSection" class="col-md-7 result-box">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h5 class="mb-0">CHÀO MỪNG QUAY TRỞ LẠI</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-4 text-center">
                                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="img-fluid rounded-circle border" alt="User">
                            </div>
                            <div class="col-8">
                                <h3 id="resName" class="text-uppercase color-gov-red"></h3>
                                <p class="mb-1"><strong>Số CCCD:</strong> <span id="resCCCD"></span></p>
                                <p class="mb-1"><strong>Ngày sinh:</strong> <span id="resDob"></span></p>
                                <p class="mb-1"><strong>Quê quán:</strong> <span id="resAddress"></span></p>
                            </div>
                        </div>
                        <hr>
                        <h6><strong>Dữ liệu thành viên trong hộ:</strong></h6>
                        <ul id="resFamily" class="list-group list-group-flush"></ul>
                        <button class="btn btn-outline-secondary btn-sm mt-4" onclick="location.reload()">Đăng xuất</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CSDL giả lập tương ứng với lệnh INSERT trong SQL
        const db = {
            "001099000003": {
                pass: "MatKhau123@",
                name: "Trần Văn Cha",
                dob: "15/02/1978",
                address: "Hai Bà Trưng, Hà Nội",
                family: ["Lê Thị Mẹ (Vợ)", "Trần Thị Con Gái (Con đẻ)", "Trần Văn Con Trai (Con đẻ)"]
            },
            "038099000007": {
                pass: "MatKhau000@",
                name: "Lê Hoàng Sinh Viên",
                dob: "05/09/2004",
                address: "Quỳnh Lưu, Nghệ An",
                family: ["Chủ hộ độc lập (Tạm trú)"]
            }
        };

        function handleLogin() {
            const user = document.getElementById("userCCCD").value;
            const pass = document.getElementById("userPass").value;
            const error = document.getElementById("loginError");

            if (db[user] && db[user].pass === pass) {
                const data = db[user];
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("infoSection").style.display = "block";
                
                document.getElementById("resName").innerText = data.name;
                document.getElementById("resCCCD").innerText = user;
                document.getElementById("resDob").innerText = data.dob;
                document.getElementById("resAddress").innerText = data.address;
                
                let familyHtml = "";
                data.family.forEach(member => {
                    familyHtml += `<li class="list-group-item">🔹 ${member}</li>`;
                });
                document.getElementById("resFamily").innerHTML = familyHtml;
            } else {
                error.style.display = "block";
            }
        }
    </script>
</body>
</html>
